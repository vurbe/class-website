<h3>Sum remainder</h3>
<blockquote>
<p>Let $a_1,a_2,\dots,a_{2018}$ be a strictly increasing sequence of positive integers such that $$a_1+a_2+\cdots+a_{2018}=2018^{2018}.$$ What is the remainder when $a_1^3+a_2^3+\cdots+a_{2018}^3$ is divided by $6$?</p>
<cite>2018 AMC 10B, <a href="https://artofproblemsolving.com/wiki/index.php/2018_AMC_10B_Problems/Problem_16">Problem 16</a></cite>
</blockquote>
