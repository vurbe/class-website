<blockquote>
  <p>
    Show that for every positive integer $n$,
    $$\left( \frac{2n-1}{e} \right)^{\frac{2n-1}{2}} < 1 \cdot 3 \cdot 5 \cdots (2n-1) < \left( \frac{2n+1}{e} \right)^{\frac{2n+1}{2}}.$$
  </p>
  <cite>
    1996 Putnam Exam, <a href="https://kskedlaya.org/putnam-archive/1996.pdf">Problem B2</a>
  </cite>
</blockquote>
